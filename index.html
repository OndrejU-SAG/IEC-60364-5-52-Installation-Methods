<!DOCTYPE html>
<html lang="en" data-mode="light" data-color="teal">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEC 60364-5-52 · Table A.52.3</title>
<style>
/* ══════════════════════════════════════════════════════════════════
   FLUENT DESIGN 2 — TOKEN SYSTEM
   Semantic tokens cascade: color-scheme → data-color → data-mode
══════════════════════════════════════════════════════════════════ */

/* ── TEAL ── */
[data-color="teal"][data-mode="light"] {
  --ac:        #00727F; --ac-hv:  #005A66; --ac-pr:  #004A54;
  --ac-sub:    #E3F4F6; --ac-sub2:#BDEAF0; --on-ac:  #ffffff;
}
[data-color="teal"][data-mode="dark"] {
  --ac:        #00C4D6; --ac-hv:  #00DAF0; --ac-pr:  #00AEC0;
  --ac-sub:    rgba(0,196,214,.14); --ac-sub2:rgba(0,196,214,.22); --on-ac: #001C20;
}

/* ── PURPLE (mauve) ── */
[data-color="purple"][data-mode="light"] {
  --ac:        #6B44A8; --ac-hv:  #5A38A0; --ac-pr:  #462C84;
  --ac-sub:    #F0EBF9; --ac-sub2:#DDD0F4; --on-ac:  #ffffff;
}
[data-color="purple"][data-mode="dark"] {
  --ac:        #B09AE0; --ac-hv:  #C6B4EE; --ac-pr:  #9C84D4;
  --ac-sub:    rgba(176,154,224,.14); --ac-sub2:rgba(176,154,224,.22); --on-ac:#0E0620;
}

/* ── RED ── */
[data-color="red"][data-mode="light"] {
  --ac:        #A4262C; --ac-hv:  #891D22; --ac-pr:  #6E161A;
  --ac-sub:    #FBECED; --ac-sub2:#F6D0D2; --on-ac:  #ffffff;
}
[data-color="red"][data-mode="dark"] {
  --ac:        #E88088; --ac-hv:  #F09298; --ac-pr:  #D46C74;
  --ac-sub:    rgba(232,128,136,.14); --ac-sub2:rgba(232,128,136,.22); --on-ac:#1E0608;
}

/* ── LIGHT NEUTRALS ── */
[data-mode="light"] {
  --bg0: #F3F2F1; --bg1: #FFFFFF; --bg2: #FAF9F8; --bg3: #F5F3F2;
  --bg-ov:    rgba(255,255,255,.88);
  --bg-hv:    rgba(0,0,0,.04);
  --bg-pr:    rgba(0,0,0,.065);
  --bd0: #E1DFDD; --bd1: #C8C6C4; --bd2: #8A8886;
  --tx0: #201F1E; --tx1: #605E5C; --tx2: #8A8886; --tx3: #C8C6C4;
  --sh2: 0 1px 2px rgba(0,0,0,.11),0 0 1px rgba(0,0,0,.09);
  --sh4: 0 2px 4px rgba(0,0,0,.11),0 0 2px rgba(0,0,0,.07);
  --sh8: 0 4px 8px rgba(0,0,0,.11),0 0 2px rgba(0,0,0,.07);
  /* group headers */
  --gh-bg: #EDECEB; --gh-bd: #E1DFDD;
  /* status badges */
  --pyes-bg:#E6F4E6; --pyes-tx:#0E7A0E; --pyes-bd:#9ECC9E;
  --ppt-bg: #FEF3E6; --ppt-tx: #B35A00; --ppt-bd: #F8C88A;
  --pno-bg: #F0EFEE; --pno-tx: #8A8886; --pno-bd: #D2D0CE;
  /* method badges – static colours work on light bg */
  --bA-tx:#0068C7; --bA-bg:#E6F2FF; --bA-bd:#9ECBF5;
  --bB-tx:#6B44A8; --bB-bg:#F0EBF9; --bB-bd:#C8B4E4;
  --bC-tx:#107C10; --bC-bg:#E6F4E6; --bC-bd:#9ECC9E;
  --bD-tx:#B35A00; --bD-bg:#FEF3E6; --bD-bd:#F8C88A;
  --bEF-tx:#00727F;--bEF-bg:#E6F4F6;--bEF-bd:#8ACED6;
  --bG-tx: #A4262C;--bG-bg: #FCE8E9;--bG-bd: #F0A0A4;
  /* filter pills */
  --pA: #0068C7; --pA-bg:#EAF3FF; --pB:#6B44A8; --pB-bg:#F2EBFB;
  --pC: #107C10; --pC-bg:#E8F5E8; --pD:#B35A00; --pD-bg:#FEF4E6;
  --pEF:#00727F;--pEF-bg:#E6F5F6; --pG:#A4262C; --pG-bg:#FCE8E9;
}

/* ── DARK NEUTRALS ── */
[data-mode="dark"] {
  --bg0: #111111; --bg1: #1C1C1C; --bg2: #242424; --bg3: #2A2A2A;
  --bg-ov:    rgba(20,20,20,.88);
  --bg-hv:    rgba(255,255,255,.055);
  --bg-pr:    rgba(255,255,255,.085);
  --bd0: #2E2E2E; --bd1: #404040; --bd2: #606060;
  --tx0: #F4F4F4; --tx1: #ADADAD; --tx2: #6C6C6C; --tx3: #3C3C3C;
  --sh2: 0 1px 2px rgba(0,0,0,.4),0 0 1px rgba(0,0,0,.3);
  --sh4: 0 2px 4px rgba(0,0,0,.4),0 0 2px rgba(0,0,0,.3);
  --sh8: 0 4px 8px rgba(0,0,0,.4),0 0 2px rgba(0,0,0,.3);
  --gh-bg: #1A1A1A; --gh-bd: #2E2E2E;
  --pyes-bg:rgba(100,196,100,.11);--pyes-tx:#6EC46E;--pyes-bd:rgba(100,196,100,.28);
  --ppt-bg: rgba(240,168,80,.11); --ppt-tx: #F0A850; --ppt-bd: rgba(240,168,80,.28);
  --pno-bg: rgba(255,255,255,.05);--pno-tx: #6C6C6C;--pno-bd: #383838;
  --bA-tx:#60AEED;--bA-bg:rgba(96,174,237,.11);--bA-bd:rgba(96,174,237,.28);
  --bB-tx:#B09AE0;--bB-bg:rgba(176,154,224,.11);--bB-bd:rgba(176,154,224,.28);
  --bC-tx:#6EC46E;--bC-bg:rgba(110,196,110,.11);--bC-bd:rgba(110,196,110,.28);
  --bD-tx:#F0A850;--bD-bg:rgba(240,168,80,.11); --bD-bd:rgba(240,168,80,.28);
  --bEF-tx:#00C4D6;--bEF-bg:rgba(0,196,214,.11);--bEF-bd:rgba(0,196,214,.28);
  --bG-tx: #F08090;--bG-bg: rgba(240,128,144,.11);--bG-bd:rgba(240,128,144,.28);
  --pA:#60AEED;--pA-bg:rgba(96,174,237,.13); --pB:#B09AE0;--pB-bg:rgba(176,154,224,.13);
  --pC:#6EC46E;--pC-bg:rgba(110,196,110,.13); --pD:#F0A850;--pD-bg:rgba(240,168,80,.13);
  --pEF:#00C4D6;--pEF-bg:rgba(0,196,214,.13); --pG:#F08090;--pG-bg:rgba(240,128,144,.13);
}

/* ══════════════════════════════════════════════════════════════════
   BASE RESET & BODY
══════════════════════════════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

html { height: 100%; }

body {
  background: var(--bg0);
  color: var(--tx0);
  font-family: 'Segoe UI Variable','Segoe UI',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size: 14px;
  line-height: 1.5;
  height: 100%;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: background .18s, color .18s;
}
a { color: var(--ac); }

/* ══════════════════════════════════════════════════════════════════
   HEADER  — acrylic / layered surface
══════════════════════════════════════════════════════════════════ */
header {
  background: var(--bg-ov);
  backdrop-filter: blur(24px) saturate(1.6);
  -webkit-backdrop-filter: blur(24px) saturate(1.6);
  border-bottom: 1px solid var(--bd0);
  height: 52px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  flex-shrink: 0;
  z-index: 200;
  box-shadow: var(--sh2);
  transition: background .18s, border-color .18s;
}

.brand {
  display: flex;
  align-items: baseline;
  gap: 6px;
  flex-shrink: 0;
}
.brand-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--tx0);
  white-space: nowrap;
}
.brand-sub {
  font-size: 13px;
  font-weight: 400;
  color: var(--tx1);
  white-space: nowrap;
}

.hdr-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

/* Search field */
.search-wrap { position: relative; }
.search-ico {
  position: absolute;
  left: 8px; top: 50%;
  transform: translateY(-50%);
  color: var(--tx2);
  pointer-events: none;
  width: 14px; height: 14px;
}
#search {
  background: var(--bg2);
  border: 1px solid var(--bd0);
  color: var(--tx0);
  padding: 5px 10px 5px 28px;
  border-radius: 6px;
  font-family: inherit;
  font-size: 13px;
  outline: none;
  width: 180px;
  transition: border-color .14s, box-shadow .14s, background .18s;
}
#search:focus {
  border-color: var(--ac);
  box-shadow: 0 0 0 1px var(--ac);
  background: var(--bg1);
}
#search::placeholder { color: var(--tx2); }

/* Divider */
.vdiv {
  width: 1px; height: 22px;
  background: var(--bd0);
  flex-shrink: 0;
}

/* Language buttons */
.lang-btn {
  background: transparent;
  border: 1px solid transparent;
  color: var(--tx1);
  padding: 4px 9px;
  border-radius: 6px;
  cursor: pointer;
  font-family: inherit;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .04em;
  transition: all .12s;
  flex-shrink: 0;
}
.lang-btn:hover  { background: var(--bg-hv); color: var(--tx0); }
.lang-btn.active {
  background: var(--ac-sub);
  border-color: var(--ac-sub2);
  color: var(--ac);
}

/* Color swatches */
.swatches {
  display: flex;
  gap: 5px;
  align-items: center;
  flex-shrink: 0;
}
.swatch {
  width: 17px; height: 17px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  outline: none;
  transition: transform .12s, box-shadow .12s;
  display: block;
  flex-shrink: 0;
}
.swatch:hover { transform: scale(1.18); }
.swatch.active {
  box-shadow: 0 0 0 2px var(--bg1), 0 0 0 4px currentColor;
}
.sw-teal   { background:#00B2C2; color:#00B2C2; }
.sw-purple { background:#9270D6; color:#9270D6; }
.sw-red    { background:#E05060; color:#E05060; }

/* Mode toggle button */
.mode-btn {
  background: transparent;
  border: 1px solid var(--bd0);
  color: var(--tx1);
  width: 32px; height: 32px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .12s;
  flex-shrink: 0;
}
.mode-btn:hover { background: var(--bg-hv); color: var(--tx0); border-color: var(--bd1); }

/* ══════════════════════════════════════════════════════════════════
   FILTER BAR
══════════════════════════════════════════════════════════════════ */
.filter-bar {
  background: var(--bg1);
  border-bottom: 1px solid var(--bd0);
  height: 44px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  gap: 5px;
  flex-shrink: 0;
  z-index: 100;
  box-shadow: var(--sh2);
  overflow-x: auto;
  scrollbar-width: none;
  transition: background .18s, border-color .18s;
}
.filter-bar::-webkit-scrollbar { display: none; }

.filter-lbl {
  font-size: 11px;
  font-weight: 600;
  color: var(--tx2);
  text-transform: uppercase;
  letter-spacing: .08em;
  margin-right: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.mpill {
  padding: 4px 12px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  border: 1px solid transparent;
  transition: opacity .12s, border-color .12s, background .18s;
  opacity: .45;
  letter-spacing: .02em;
  white-space: nowrap;
  flex-shrink: 0;
  user-select: none;
}
.mpill.on { opacity: 1; }
.mpill:hover { opacity: 1; }

.mall  { background:var(--bg2); color:var(--tx1); border-color:var(--bd0); opacity:1!important; }
.mall.on { background:var(--ac-sub); color:var(--ac); border-color:var(--ac-sub2); }
.mA  { background:var(--pA-bg);  color:var(--pA);  } .mpill.on.mA  { border-color:var(--bA-bd); }
.mB  { background:var(--pB-bg);  color:var(--pB);  } .mpill.on.mB  { border-color:var(--bB-bd); }
.mC  { background:var(--pC-bg);  color:var(--pC);  } .mpill.on.mC  { border-color:var(--bC-bd); }
.mD  { background:var(--pD-bg);  color:var(--pD);  } .mpill.on.mD  { border-color:var(--bD-bd); }
.mE  { background:var(--pEF-bg); color:var(--pEF); } .mpill.on.mE  { border-color:var(--bEF-bd);}
.mG  { background:var(--pG-bg);  color:var(--pG);  } .mpill.on.mG  { border-color:var(--bG-bd); }

/* ══════════════════════════════════════════════════════════════════
   SUMMARY BAR
══════════════════════════════════════════════════════════════════ */
.summary-bar {
  padding: 6px 20px;
  font-size: 12px;
  color: var(--tx2);
  background: var(--bg0);
  border-bottom: 1px solid var(--bd0);
  transition: background .18s, color .18s;
}
#item-count { color: var(--tx1); font-weight: 600; }

/* ══════════════════════════════════════════════════════════════════
   TABLE
══════════════════════════════════════════════════════════════════ */
.tbl-wrap { flex: 1; overflow: auto; min-height: 0; }

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 700px;
  background: var(--bg1);
  transition: background .18s;
}

thead th {
  background: var(--bg2);
  padding: 8px 14px;
  text-align: left;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .08em;
  color: var(--tx2);
  border-bottom: 1px solid var(--bd0);
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 50;
  transition: background .18s, color .18s;
}
thead th:nth-child(1) { width:44px; text-align:center; }
thead th:nth-child(2) { width:72px; text-align:center; }
thead th:nth-child(3) { width:114px; text-align:center; }
thead th:nth-child(4) { width:27%; }
thead th:nth-child(6) { width:21%; }

tbody tr {
  border-bottom: 1px solid var(--bd0);
  transition: background .09s;
}
tbody tr:hover { background: var(--bg-hv); }
tbody tr.hidden { display: none; }

td { padding: 10px 14px; vertical-align: middle; }

/* Row number */
.td-n {
  text-align: center;
  font-size: 13px;
  font-weight: 600;
  color: var(--tx2);
  font-family: 'Cascadia Code','Consolas','Courier New',monospace;
  font-variant-numeric: tabular-nums;
}

/* Method badge column */
.td-m { text-align: center; }

.mbadge {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: .04em;
  font-family: 'Cascadia Code','Consolas','Courier New',monospace;
  white-space: nowrap;
}
.bA1,.bA2        { background:var(--bA-bg);  color:var(--bA-tx);  border:1px solid var(--bA-bd); }
.bB1,.bB2,.bB12  { background:var(--bB-bg);  color:var(--bB-tx);  border:1px solid var(--bB-bd); }
.bC              { background:var(--bC-bg);  color:var(--bC-tx);  border:1px solid var(--bC-bd); }
.bD1,.bD2        { background:var(--bD-bg);  color:var(--bD-tx);  border:1px solid var(--bD-bd); }
.bEF             { background:var(--bEF-bg); color:var(--bEF-tx); border:1px solid var(--bEF-bd);}
.bG              { background:var(--bG-bg);  color:var(--bG-tx);  border:1px solid var(--bG-bd); }

/* SVG illustration cell */
.td-svg { text-align: center; padding: 8px 10px; }
.td-svg svg {
  width: 100px; height: 75px;
  display: block; margin: auto;
  border-radius: 5px;
  box-shadow: var(--sh4);
}

/* Text cells */
.td-desc {
  font-size: 12.5px;
  color: var(--tx1);
  font-style: italic;
  line-height: 1.52;
}
.td-ex {
  font-size: 13px;
  color: var(--tx0);
  line-height: 1.55;
}
.td-panel { vertical-align: top; padding-top: 11px; }

.note {
  font-size: 11.5px;
  color: var(--tx2);
  margin-top: 3px;
}

/* Panel relevance badges */
.prelvt {
  display: inline-flex;
  align-items: center;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  margin-bottom: 4px;
  letter-spacing: .03em;
}
.pyes  { background:var(--pyes-bg); color:var(--pyes-tx); border:1px solid var(--pyes-bd); }
.ppart { background:var(--ppt-bg);  color:var(--ppt-tx);  border:1px solid var(--ppt-bd); }
.pno   { background:var(--pno-bg);  color:var(--pno-tx);  border:1px solid var(--pno-bd); }
.pnote { font-size:12px; color:var(--tx1); line-height:1.5; }

/* Group headers */
tr.group-hdr td {
  background: var(--gh-bg);
  color: var(--ac);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .1em;
  padding: 6px 14px;
  border-top: 1px solid var(--bd0);
  border-bottom: 1px solid var(--gh-bd);
  transition: background .18s, color .18s;
}

/* ══════════════════════════════════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════════════════════════════════ */
@media (max-width: 820px) {
  .td-desc { display: none; }
  thead th:nth-child(4) { display: none; }
  .brand-sub { display: none; }
  #search { width: 130px; }
}
@media (max-width: 560px) {
  .vdiv { display: none; }
  .hdr-controls { gap: 5px; }
  #search { width: 100px; }
}
</style>
</head>
<body>

<!-- ══ HEADER ══ -->
<header>
  <div class="brand">
    <span class="brand-title">IEC 60364-5-52</span>
    <span class="brand-sub">· Table A.52.3 · Installation Methods</span>
  </div>
  <div class="hdr-controls">
    <!-- Search -->
    <div class="search-wrap">
      <svg class="search-ico" viewBox="0 0 16 16" fill="none">
        <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
        <line x1="10" y1="10" x2="14" y2="14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <input id="search" type="text" placeholder="Search…" oninput="applyFilters()">
    </div>
    <div class="vdiv"></div>
    <!-- Language -->
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('cs')">CS</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
    <div class="vdiv"></div>
    <!-- Color theme swatches -->
    <div class="swatches">
      <button id="sw-teal"   class="swatch sw-teal   active" onclick="setColor('teal')"   title="Teal"></button>
      <button id="sw-purple" class="swatch sw-purple"        onclick="setColor('purple')" title="Purple"></button>
      <button id="sw-red"    class="swatch sw-red"           onclick="setColor('red')"    title="Red"></button>
    </div>
    <div class="vdiv"></div>
    <!-- Dark/Light toggle -->
    <button class="mode-btn" id="mode-btn" onclick="toggleMode()" title="Toggle theme">
      <!-- icon filled by JS -->
    </button>
  </div>
</header>

<!-- ══ FILTER BAR ══ -->
<div class="filter-bar">
  <span class="filter-lbl">Method</span>
  <span class="mpill mall on" onclick="filterMethod('all')">All</span>
  <span class="mpill mA  on" onclick="filterMethod('A')">A1 / A2</span>
  <span class="mpill mB  on" onclick="filterMethod('B')">B1 / B2</span>
  <span class="mpill mC  on" onclick="filterMethod('C')">C</span>
  <span class="mpill mD  on" onclick="filterMethod('D')">D1 / D2</span>
  <span class="mpill mE  on" onclick="filterMethod('E')">E / F</span>
  <span class="mpill mG  on" onclick="filterMethod('G')">G</span>
</div>

<!-- ══ SUMMARY ══ -->
<div class="summary-bar">
  Showing <span id="item-count">—</span> items · IEC 60364-5-52:2009 Table A.52.3
</div>

<!-- ══ TABLE ══ -->
<div class="tbl-wrap">
<table id="tbl">
<thead>
  <tr>
    <th>#</th>
    <th>Method</th>
    <th>Illustration</th>
    <th id="th-desc">Standard Description</th>
    <th id="th-ex">Plain Explanation</th>
    <th id="th-panel">Panel / Switchgear Use</th>
  </tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   THEME  /  PERSISTENCE
   Defaults: light + teal  — overridden by localStorage
════════════════════════════════════════════════════════════════ */

let curMode, curColor;

(function initTheme() {
  // Color: localStorage → default teal
  curColor = localStorage.getItem('iec-color') || 'teal';

  // Mode: localStorage → browser prefers-color-scheme → default light
  if (localStorage.getItem('iec-mode')) {
    curMode = localStorage.getItem('iec-mode');
  } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
    curMode = 'dark';
  } else {
    curMode = 'light';
  }

  applyTheme();

  // Live system preference change — only if user hasn't set a preference
  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('iec-mode')) {
      curMode = e.matches ? 'dark' : 'light';
      applyTheme();
    }
  });
})();

function applyTheme() {
  const root = document.documentElement;
  root.dataset.mode  = curMode;
  root.dataset.color = curColor;

  // Mode button icon
  const btn = document.getElementById('mode-btn');
  if (btn) btn.innerHTML = curMode === 'dark' ? SUN_SVG : MOON_SVG;

  // Swatch active states
  ['teal','purple','red'].forEach(c => {
    const el = document.getElementById('sw-' + c);
    if (el) el.classList.toggle('active', c === curColor);
  });
}

function toggleMode() {
  curMode = curMode === 'dark' ? 'light' : 'dark';
  localStorage.setItem('iec-mode', curMode);
  applyTheme();
}

function setColor(c) {
  curColor = c;
  localStorage.setItem('iec-color', c);
  applyTheme();
}

          de:'Isolierte Leiter oder einadrige Kabel in Kabelkanal an der Wand — waagerecht verlegt'},
    expl:{en:'Individual conductors laid in a rectangular surface-mounted trunking running horizontally. Heat builds up less than in a fully enclosed conduit due to larger internal volume.',
          cs:'Jednotlivé vodiče uložené v obdélníkovém kabelovém kanálu na povrchu, vedené vodorovně. Teplo se hromadí méně než v uzavřené trubce díky většímu vnitřnímu objemu.',
          de:'Einzelleiter in waagerecht verlaufendem Aufputz-Kabelkanal. Wärmestau geringer als in geschlossenem Rohr aufgrund des größeren Innenvolumens.'}},
  { group:'g_wall', id:7, method:'B1', svgFn:'item7',
    desc:{en:'Insulated conductors or single-core cables in cable trunking on a wooden or masonry wall — run vertically',
          cs:'Izolované vodiče nebo jednožilové kabely v kabelovém kanálu na stěně — vedené svisle',

    expl:{en:'Same as method 6 but the trunking runs vertically. Vertical runs allow slightly better natural convection, but the standard applies the same B1 capacity tables.',
          cs:'Stejné jako metoda 6, ale kabelový kanál je veden svisle. Svislé vedení umožňuje lepší přirozenou konvekci, norma však stále používá stejné tabulky B1.',
          de:'Wie Methode 6, jedoch senkrechter Verlauf. Senkrechte Führung erlaubt etwas bessere Konvektion, die Norm wendet dennoch dieselben B1-Tabellen an.'}},
  { group:'g_wall', id:8, method:'B2', svgFn:'item8',
    desc:{en:'Multi-core cable in cable trunking on a wooden or masonry wall — run horizontally',
          cs:'Vícežilový kabel v kabelovém kanálu na stěně — vedený vodorovně',
          de:'Mehraderkabel in Kabelkanal an der Wand — waagerecht verlegt'},
    expl:{en:'Multi-core cable in a horizontal surface-mounted trunking. The cable\'s multiple cores produce more heat internally, placing this one step lower than B1 for capacity.',
          cs:'Vícežilový kabel ve vodorovném kabelovém kanálu na povrchu. Více žil kabelu produkuje více tepla vnitřně — o krok nižší proudová zatížitelnost než B1.',
          de:'Mehraderkabel im waagerechten Aufputz-Kabelkanal. Mehrere Adern erzeugen mehr innere Wärme — Strombelastbarkeit eine Stufe unter B1.'}},
  { group:'g_wall', id:9, method:'B2', svgFn:'item9',
    desc:{en:'Multi-core cable in cable trunking on a wooden or masonry wall — run vertically',
          cs:'Vícežilový kabel v kabelovém kanálu na stěně — vedený svisle',
          de:'Mehraderkabel in Kabelkanal an der Wand — senkrecht verlegt'},
    expl:{en:'Multi-core cable in vertical surface-mounted trunking. Applies the same B2 capacity tables as method 8; vertical orientation does not significantly change the rating.',
          cs:'Vícežilový kabel ve svislém kabelovém kanálu na povrchu. Používají se stejné tabulky B2 jako pro metodu 8; svislá orientace nemění výrazně zatížitelnost.',
          de:'Mehraderkabel im senkrechten Aufputz-Kabelkanal. Gleiche B2-Tabellen wie Methode 8; senkrechte Ausrichtung ändert die Belastbarkeit nicht wesentlich.'}},

  // ── SUSPENDED TRUNKING
  { group:'g_susp', id:10, method:'B1', svgFn:'item10',
    desc:{en:'Insulated conductors or single-core cables in suspended cable trunking',
          cs:'Izolované vodiče nebo jednožilové kabely v závěsném kabelovém kanálu',
          de:'Isolierte Leiter oder einadrige Kabel in hängendem Kabelkanal'},
    expl:{en:'Trunking hung from ceiling on hangers. Better ventilation than wall-mounted (air circulates on all sides) but the enclosed trunking still restricts heat loss — rated B1.',
          cs:'Kabelový kanál zavěšený na stropě. Lepší větrání než nástěnný (vzduch cirkuluje ze všech stran), ale uzavřený kanál stále omezuje odvod tepla — hodnocen B1.',
          de:'Kabelkanal an der Decke hängend. Bessere Belüftung als wandmontiert (Luft zirkuliert allseitig), aber das geschlossene Gehäuse begrenzt die Wärmeabfuhr — bewertet B1.'}},
  { group:'g_susp', id:11, method:'B2', svgFn:'item11',
    desc:{en:'Multi-core cable in suspended cable trunking',
          cs:'Vícežilový kabel v závěsném kabelovém kanálu',
          de:'Mehraderkabel in hängendem Kabelkanal'},
    expl:{en:'Same suspended arrangement as method 10 but using a multi-core cable. The cable\'s bundled cores generate more internal heat, so B2 tables apply.',
          cs:'Stejné zavěšení jako metoda 10, ale s vícežilovým kabelem. Svázané žíly generují více vnitřního tepla, proto platí tabulky B2.',
          de:'Gleiche hängende Anordnung wie Methode 10, aber mit Mehraderkabel. Die gebündelten Adern erzeugen mehr innere Wärme — B2-Tabellen gelten.'}},

  // ── MOULDINGS
  { group:'g_mold', id:12, method:'A1', svgFn:'item12',
    desc:{en:'Insulated conductors or single-core cables run in mouldings',
          cs:'Izolované vodiče nebo jednožilové kabely vedené v kabelových lištách',
          de:'Isolierte Leiter oder einadrige Kabel in Kabelleisten'},
    expl:{en:'Conductors inside skirting-board or decorative mouldings fixed to a wall. The small enclosed cross-section and adjacent wall limit heat dissipation, hence rated A1.',
          cs:'Vodiče uvnitř soklových nebo dekorativních lišt připevněných ke stěně. Malý uzavřený průřez a přiléhající stěna omezují odvod tepla — hodnoceno A1.',
          de:'Leiter in Sockel- oder Zierleisten an der Wand. Kleiner geschlossener Querschnitt und anliegende Wand begrenzen Wärmeabfuhr — bewertet A1.'}},
  { group:'g_mold', id:13, method:'A1', svgFn:'item13',
    desc:{en:'Multi-core cable run in mouldings',
          cs:'Vícežilový kabel vedený v kabelových lištách',
          de:'Mehraderkabel in Kabelleisten'},
    expl:{en:'Multi-core cable inside a moulding. Heat dissipation is equally limited by the enclosed moulding geometry — same A1 rating applies as for individual conductors.',
          cs:'Vícežilový kabel uvnitř lišty. Odvod tepla je stejně omezen uzavřenou geometrií lišty — platí stejné hodnocení A1 jako pro jednotlivé vodiče.',
          de:'Mehraderkabel in einer Leiste. Wärmeabfuhr ist durch die geschlossene Leistengeometrie gleichermaßen begrenzt — gleiche A1-Bewertung wie bei Einzelleitern.'}},
  { group:'g_mold', id:15, method:'A1', svgFn:'item15',
    desc:{en:'Insulated conductors in conduit or single/multi-core cable in architrave',

          de:'Isolierte Leiter in Rohr oder ein-/mehradriges Kabel in der Türzarge'},
    expl:{en:'Cable or conduit concealed inside a door architrave (the decorative frame around a door). Thermal conditions resemble mouldings — A1 applies.',
          cs:'Kabel nebo trubka skrytá uvnitř obložkové zárubeně (dekorativní rám kolem dveří). Tepelné podmínky se podobají lištám — platí A1.',
          de:'Kabel oder Rohr verdeckt in der Türzarge (Zierrahmen um eine Tür). Thermische Bedingungen ähnlich wie bei Leisten — A1 gilt.'}},
  { group:'g_mold', id:16, method:'A1', svgFn:'item16',
    desc:{en:'Insulated conductors in conduit or single/multi-core cable in window frames',
          cs:'Izolované vodiče v trubce nebo jedno/vícežilový kabel v okenním rámu',
          de:'Isolierte Leiter in Rohr oder ein-/mehradriges Kabel im Fensterrahmen'},
    expl:{en:'Cable hidden inside window frame profiles. Often used in older buildings to run cables around windows. Thermally similar to architraves — A1 rating.',
          cs:'Kabel skrytý uvnitř profilů okenního rámu. Často se používá ve starších budovách pro vedení kabelů kolem oken. Tepelně podobné zárubeňím — hodnocení A1.',
          de:'Kabel im Fensterrahmen versteckt. Häufig in älteren Gebäuden um Fenster herum. Thermisch ähnlich wie Türzargen — Bewertung A1.'}},

  // ── SURFACE MOUNTED
  { group:'g_surf', id:20, method:'C', svgFn:'item20',
    desc:{en:'Single-core or multi-core cables fixed on, or spaced less than 0.3× cable diameter from, a wooden or masonry wall',
          cs:'Jednožilové nebo vícežilové kabely připevněné na dřevěné nebo zděné stěně nebo vzdálené méně než 0,3× průměr kabelu od stěny',
          de:'Ein- oder mehradrige Kabel auf einer Holz- oder Mauerwerkswand befestigt oder mit Abstand < 0,3× Kabeldurchmesser'},
    expl:{en:'Cable clipped directly to a wall surface. The wall conducts heat away on one side while the other side loses heat to air. Good capacity — method C.',
          cs:'Kabel upnutý přímo na povrch stěny. Stěna odvádí teplo z jedné strany, druhá strana ztrácí teplo do vzduchu. Dobrá zatížitelnost — metoda C.',
          de:'Kabel direkt an Wandoberfläche geklemmt. Wand leitet Wärme auf einer Seite ab, andere Seite gibt Wärme an Luft ab. Gute Kapazität — Methode C.'}},
  { group:'g_surf', id:21, method:'C', svgFn:'item21',
    desc:{en:'Single-core or multi-core cables fixed directly under a wooden or masonry ceiling',
          cs:'Jednožilové nebo vícežilové kabely připevněné přímo pod dřevěným nebo zděným stropem',
          de:'Ein- oder mehradrige Kabel direkt unter einer Holz- oder Betondecke befestigt'},
    expl:{en:'Cable clipped to the underside of a ceiling. Heat rises to the ceiling on one side; air circulation below cools the other. Thermally rated the same as wall-mounted (method C).',
          cs:'Kabel upnutý na spodní stranu stropu. Teplo stoupá ke stropu z jedné strany, vzduch níže chladí druhou. Tepelně hodnoceno stejně jako nástěnné uložení (metoda C).',
          de:'Kabel unter der Decke befestigt. Wärme steigt auf der einen Seite zur Decke, Luft darunter kühlt die andere Seite. Thermisch wie Wandmontage bewertet (Methode C).'}},

  // ── TRAYS & LADDERS
  { group:'g_tray', id:30, method:'C', svgFn:'item30',
    desc:{en:'Single-core or multi-core cables on unperforated cable tray — run horizontally or vertically',
          cs:'Jednožilové nebo vícežilové kabely na neperforovaném kabelovém žlabu — vedené vodorovně nebo svisle',
          de:'Ein- oder mehradrige Kabel auf ungelochter Kabelrinne — waagerecht oder senkrecht'},
    expl:{en:'Cables laid on a solid (unperforated) tray. The solid bottom restricts airflow underneath — similar thermal performance to cables clipped to a wall, hence method C.',
          cs:'Kabely uložené na pevném (neperforovaném) žlabu. Pevné dno omezuje proudění vzduchu pod žlabem — podobné tepelné chování jako kabely přichycené na stěně, proto metoda C.',
          de:'Kabel auf geschlossener (ungelochter) Rinne. Fester Boden schränkt Luftzirkulation darunter ein — ähnliche thermische Leistung wie wandmontierte Kabel, daher Methode C.'}},
  { group:'g_tray', id:31, method:'E or F', svgFn:'item31',
    desc:{en:'Single-core or multi-core cables on perforated cable tray — run horizontally or vertically',

          de:'Ein- oder mehradrige Kabel auf gelochter Kabelrinne — waagerecht oder senkrecht'},
    expl:{en:'Cables on a perforated (ventilated) tray. Airflow through the perforations dramatically improves cooling — this gives one of the highest current capacities (E/F).',
          cs:'Kabely na perforovaném (větraném) žlabu. Proudění vzduchu skrz perforace výrazně zlepšuje chlazení — to dává jednu z nejvyšších proudových zatížitelností (E/F).',
          de:'Kabel auf gelochter (belüfteter) Rinne. Luftstrom durch die Perforation verbessert die Kühlung erheblich — eine der höchsten Strombelastbarkeiten (E/F).'}},
  { group:'g_tray', id:32, method:'E or F', svgFn:'item32',
    desc:{en:'Single-core or multi-core cables on cable ladder, brackets, or cleats',
          cs:'Jednožilové nebo vícežilové kabely na kabelovém žebříku, konzolách nebo příchytkách',
          de:'Ein- oder mehradrige Kabel auf Kabelleiter, Konsolen oder Schellen'},
    expl:{en:'Cables resting on ladder-type supports. Maximum air exposure on all sides provides excellent cooling — method E (multi-core) or F (single-core trefoil) with highest ampacity.',
          cs:'Kabely uložené na žebříkových podporách. Maximální přístup vzduchu ze všech stran zajišťuje vynikající chlazení — metoda E (vícežilový) nebo F (jednožilový trojúhelník) s nejvyšší zatížitelností.',
          de:'Kabel auf Leitertyp-Tragstrukturen. Maximale Luftexposition auf allen Seiten bietet exzellente Kühlung — Methode E (mehradrig) oder F (einadrig Dreieck) mit höchster Belastbarkeit.'}},
  { group:'g_tray', id:33, method:'E or F', svgFn:'item33',
    desc:{en:'Single-core or multi-core cables spaced more than 0.3× cable diameter from wall or from each other',
          cs:'Jednožilové nebo vícežilové kabely vzdálené více než 0,3× průměr kabelu od stěny nebo od sebe',
          de:'Ein- oder mehradrige Kabel mit Abstand > 0,3× Kabeldurchmesser zur Wand oder untereinander'},
    expl:{en:'Cables held away from any surface so air can circulate freely all around. This spacing eliminates mutual heating and wall proximity effects — method E/F capacity applies.',
          cs:'Kabely drženy od povrchu, aby vzduch mohl volně cirkulovat kolem. Tato vzdálenost eliminuje vzájemné ohřívání a blízkost stěny — platí zatížitelnost E/F.',
          de:'Kabel mit Abstand zu allen Oberflächen, sodass Luft frei zirkulieren kann. Abstand eliminiert gegenseitige Erwärmung und Wandnähe — E/F-Belastbarkeit gilt.'}},
  { group:'g_tray', id:34, method:'E or F', svgFn:'item34',
    desc:{en:'Single-core or multi-core cables suspended from or incorporating a support (catenary) wire',

          de:'Ein- oder mehradrige Kabel hängend an oder mit einem Tragseil'},
    expl:{en:'Cables hanging freely from a catenary wire strung between supports — typical for overhead spans. Free hanging gives excellent all-round air access; E/F tables apply.',
          cs:'Kabely volně visící z nosného drátu nataženého mezi podporami — typické pro mezipodporová pole. Volné zavěšení zajišťuje vynikající přístup vzduchu; platí tabulky E/F.',
          de:'Kabel frei hängend an einem zwischen Stützen gespannten Tragseil — typisch für Freiluftspannfelder. Freies Hängen bietet exzellenten allseitigen Luftzutritt; E/F-Tabellen gelten.'}},
  { group:'g_tray', id:35, method:'G', svgFn:'item35',
    desc:{en:'Bare or insulated conductors on insulators',
          cs:'Holé nebo izolované vodiče na izolátorech',
          de:'Nackte oder isolierte Leiter auf Isolatoren'},
    expl:{en:'Conductors mounted on ceramic or polymer insulators with full air exposure on all sides. This is the best possible thermal condition — method G gives the highest current rating.',
          cs:'Vodiče namontované na keramických nebo polymerních izolátorech s plným přístupem vzduchu ze všech stran. Nejlepší možné tepelné podmínky — metoda G dává nejvyšší proudovou zatížitelnost.',
          de:'Leiter auf keramischen oder Polymer-Isolatoren mit vollständigem allseitigen Luftzutritt. Beste mögliche Wärmebedingung — Methode G ergibt höchste Strombelastbarkeit.'}},

  // ── BUILDING VOIDS & DUCTING
  { group:'g_void', id:40, method:'B1/B2', svgFn:'item40',
    desc:{en:'Single-core or multi-core cable in a building void: B2 if void < 5× cable dia.; B1 if void ≥ 5× cable dia. (up to < 20×)',

          de:'Ein- oder mehradriges Kabel im Gebäudehohlraum: B2 bei Hohlraum < 5× Kabeldurchmesser; B1 bei ≥ 5× (bis < 20×)'},

          de:'Kabel durch einen Hohlraum im Gebäude (z.B. Hohlblockwand, Bodenhohlraum). Methode hängt davon ab, wie groß der Hohlraum im Verhältnis zum Kabeldurchmesser ist.'}},
  { group:'g_void', id:41, method:'B1/B2', svgFn:'item41',

          de:'Einzelleiter in Rohr durch Gebäudehohlraum. Methode B2 oder B1 gilt je nach Verhältnis Hohlraum/Rohrdurchmesser — gleiches Prinzip wie bei Pos. 40.'}},
  { group:'g_void', id:42, method:'B1/B2', svgFn:'item42',

          de:'Mehraderkabel in Rohr durch Gebäudehohlraum. Zwei Ebenen thermischer Einschließung (Rohr + Hohlraum); Methode B1/B2 je nach Hohlraumgröße.'}},
  { group:'g_void', id:43, method:'B1/B2', svgFn:'item43',

  { group:'g_void', id:44, method:'B1/B2', svgFn:'item44',

    expl:{en:'Multi-core cable laid inside a duct or trunking within a building void. The same dimensional conditions apply as for items 40–43 to determine B1 vs B2.',

          de:'Mehraderkabel in Kabelkanal in Gebäudehohlraum. Gleiche Maßbedingungen wie bei Pos. 40–43 für die Bestimmung B1 vs B2.'}},
  { group:'g_void', id:45, method:'B1/B2', svgFn:'item45',

  { group:'g_void', id:46, method:'B1/B2', svgFn:'item46',

          de:'Ein- oder mehradriges Kabel in Kabelkanal in Mauerwerk (Wärmewiderstand ≤ 2 K·m/W)'},
    expl:{en:'Multi-core cable in a duct embedded in standard masonry. Same as item 45 but using a cable rather than individual conductors. Method B1/B2 per dimensional and thermal conditions.',

          de:'Mehraderkabel in Kabelkanal in normalem Mauerwerk. Wie Pos. 45, jedoch Kabel statt Einzelleitern. B1/B2 je nach Maß- und Wärmebedingungen.'}},
  { group:'g_void', id:'46B', method:'B1/B2', svgFn:'item46B',

function panelCell(id, l) {
  const p = PANEL[id];
  if (!p) return '<span class="prelvt pno">—</span>';
  const label = {yes:{en:'Relevant',cs:'Relevantní',de:'Relevant'}, partial:{en:'Partial',cs:'Částečně',de:'Teilweise'}, no:{en:'N/A',cs:'N/A',de:'N/A'}};
  const cls   = {yes:'pyes', partial:'ppart', no:'pno'};
  const note  = p[l] && p[l] !== '—' ? `<div class="pnote">${p[l]}</div>` : '';
  return `<span class="prelvt ${cls[p.r]}">${label[p.r][l]}</span>${note}`;
}

function render() {
  const tbody = document.getElementById('tbody');
  let lastGroup = null;
  let rows = '';
  ITEMS.forEach(item => {
    if (item.group !== lastGroup) {
      const g = GMAP[item.group];
      rows += `<tr class="group-hdr" data-group="${item.group}"><td colspan="6">${g[curLang]}</td></tr>`;
      lastGroup = item.group;
    }
    const c = MC[item.method] || '#60AEED';
    const svgMarkup = G[item.svgFn](c);
    const bc = badgeClass(item.method);
    rows += `<tr data-id="${item.id}" data-method="${item.method}" data-group="${item.group}">
      <td class="td-n">${item.id}</td>
      <td class="td-m"><span class="mbadge ${bc}">${item.method}</span></td>
      <td class="td-svg">${svgMarkup}</td>
      <td class="td-desc">${item.desc[curLang]}</td>
      <td class="td-ex">${item.expl[curLang]}</td>
      <td class="td-panel">${panelCell(item.id, curLang)}</td>
    </tr>`;
  });
  tbody.innerHTML = rows;
  applyFilters();
}

/* ════════════════════════════════════════════════════════════════
   FILTERS & LANGUAGE
════════════════════════════════════════════════════════════════ */
function setLang(l) {
  curLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === l.toUpperCase());
  });
  document.getElementById('th-desc').textContent  = {en:'Standard Description',cs:'Popis z normy',de:'Normbeschreibung'}[l];
  document.getElementById('th-ex').textContent    = {en:'Plain Explanation',cs:'Jednoduché vysvětlení',de:'Einfache Erklärung'}[l];
  document.getElementById('th-panel').textContent = {en:'Panel / Switchgear Use',cs:'Použití v rozvaděči',de:'Verwendung im Schaltschrank'}[l];
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const id   = tr.dataset.id;
    const item = ITEMS.find(i => String(i.id) === id);
    if (!item) return;
    tr.querySelector('.td-desc').textContent  = item.desc[l];
    tr.querySelector('.td-ex').textContent    = item.expl[l];
    tr.querySelector('.td-panel').innerHTML   = panelCell(item.id, l);
  });
  document.querySelectorAll('.group-hdr').forEach(tr => {
    const g = GMAP[tr.dataset.group];
    if (g) tr.querySelector('td').textContent = g[l];
  });
  applyFilters();
}

function filterMethod(m) {
  curMethod = m;
  document.querySelectorAll('.mpill').forEach(p => {
    const pm = p.textContent.replace(/\s*/g, '');
    p.classList.toggle('on',
      m === 'all' || pm === 'All' ||
      (m === 'A' && pm === 'A1/A2') ||
      (m === 'B' && pm === 'B1/B2') ||
      (m === 'C' && pm === 'C') ||
      (m === 'D' && pm === 'D1/D2') ||
      (m === 'E' && pm === 'E/F') ||
      (m === 'G' && pm === 'G') ||
      pm === 'All'
    );
  });
  applyFilters();
}

  const q = document.getElementById('search').value.toLowerCase();
  const groupVisibility = {};
  let visible = 0;
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const method = tr.dataset.method;
    const methodMatch = curMethod === 'all' ||
      (curMethod === 'A' && method.startsWith('A')) ||
      (curMethod === 'B' && method.startsWith('B')) ||
      (curMethod === 'C' && method === 'C') ||
      (curMethod === 'D' && method.startsWith('D')) ||
      (curMethod === 'E' && method.includes('E')) ||
      (curMethod === 'G' && method === 'G');
    const textMatch = !q || tr.textContent.toLowerCase().includes(q);
    const show = methodMatch && textMatch;
    tr.classList.toggle('hidden', !show);
    if (show) { visible++; groupVisibility[tr.dataset.group] = true; }
  });
  document.querySelectorAll('#tbody tr.group-hdr').forEach(tr => {
    tr.classList.toggle('hidden', !groupVisibility[tr.dataset.group]);
  });
  document.getElementById('item-count').textContent = `${visible} of ${ITEMS.length}`;
}

/* ════════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════════ */
render();
</script>
</body>
