<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IEC 60364-5-52 · Table A.52.3</title>
<style>
:root{
  --base:#1e1e2e;--mantle:#181825;--crust:#11111b;
  --s0:#313244;--s1:#45475a;--s2:#585b70;
  --ov0:#6c7086;--ov1:#7f849c;--sub0:#a6adc8;--sub1:#bac2de;
  --text:#cdd6f4;--mauve:#cba6f7;--blue:#89b4fa;--sapphire:#74c7ec;
  --teal:#94e2d5;--green:#a6e3a1;--yellow:#f9e2af;--peach:#fab387;
  --pink:#f5c2e7;--red:#f38ba8;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--base);color:var(--text);font-family:'JetBrains Mono','Cascadia Code','Consolas',monospace;font-size:13px;min-height:100vh}
a{color:var(--mauve)}

/* HEADER */
header{
  background:var(--mantle);border-bottom:2px solid var(--mauve);
  padding:.9rem 1.5rem;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:.75rem;
  position:sticky;top:0;z-index:100;
}
.title{font-size:.95rem;font-weight:700;color:var(--mauve);letter-spacing:.03em}
.title span{color:var(--sub0);font-weight:400}
.controls{display:flex;gap:.5rem;align-items:center;flex-wrap:wrap}
.lang-btn{background:var(--s0);border:1px solid var(--s1);color:var(--sub0);
  padding:.25rem .6rem;border-radius:4px;cursor:pointer;font-family:inherit;
  font-size:.75rem;font-weight:600;transition:all .15s;letter-spacing:.05em}
.lang-btn.active,.lang-btn:hover{background:var(--s1);color:var(--mauve);border-color:var(--mauve)}
#search{background:var(--s0);border:1px solid var(--s1);color:var(--text);
  padding:.28rem .7rem;border-radius:4px;font-family:inherit;font-size:.8rem;
  outline:none;width:180px;transition:border-color .15s}
#search:focus{border-color:var(--mauve)}
#search::placeholder{color:var(--ov0)}

/* FILTER BAR */
.filter-bar{
  background:var(--mantle);border-bottom:1px solid var(--s0);
  padding:.55rem 1.5rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;
  position:sticky;top:54px;z-index:99;
}
.filter-label{font-size:.7rem;color:var(--ov0);text-transform:uppercase;letter-spacing:.08em;margin-right:.25rem}
.mpill{padding:.15rem .55rem;border-radius:999px;font-size:.72rem;font-weight:700;
  cursor:pointer;border:1px solid transparent;transition:all .15s;opacity:.45;letter-spacing:.04em}
.mpill.on{opacity:1}
.mA{background:#0e2130;color:var(--sapphire);border-color:#74c7ec30}
.mB{background:#1f1730;color:var(--mauve);border-color:#cba6f730}
.mC{background:#102010;color:var(--green);border-color:#a6e3a130}
.mD{background:#201a0a;color:var(--peach);border-color:#fab38730}
.mE{background:#0e2020;color:var(--teal);border-color:#94e2d530}
.mG{background:#201020;color:var(--pink);border-color:#f5c2e730}
.mall{background:var(--s0);color:var(--text);border-color:var(--s1);opacity:1!important}

/* SUMMARY BAR */
.summary-bar{padding:.35rem 1.5rem;font-size:.72rem;color:var(--ov0);
  background:var(--crust);border-bottom:1px solid var(--s0)}
#item-count{color:var(--sub0);font-weight:600}

/* TABLE */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;min-width:700px}
thead th{
  background:var(--crust);padding:.6rem 1rem;text-align:left;
  font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;
  color:var(--ov0);border-bottom:1px solid var(--s0);
  white-space:nowrap;
}
thead th:nth-child(1){width:42px;text-align:center}
thead th:nth-child(2){width:60px;text-align:center}
thead th:nth-child(3){width:106px;text-align:center}
thead th:nth-child(4){width:28%}
thead th:nth-child(6){width:20%}
.td-panel{font-size:.8rem;line-height:1.45;vertical-align:middle}
.prelvt{display:inline-block;font-size:.68rem;font-weight:700;padding:.12rem .45rem;border-radius:3px;margin-bottom:.35rem;letter-spacing:.04em}
.pyes{background:#a6e3a118;color:var(--green);border:1px solid #a6e3a140}
.ppart{background:#f9e2af18;color:var(--yellow);border:1px solid #f9e2af40}
.pno{background:var(--s0);color:var(--ov0);border:1px solid var(--s1);opacity:.7}
.pnote{color:var(--sub0);font-size:.78rem}
tbody tr{border-bottom:1px solid var(--s0);transition:background .1s}
tbody tr:hover{background:var(--s0)}
tbody tr.hidden{display:none}
td{padding:.65rem 1rem;vertical-align:middle}
.td-n{text-align:center;font-size:.95rem;font-weight:700;color:var(--ov1)}
.td-m{text-align:center}
.mbadge{display:inline-block;padding:.18rem .45rem;border-radius:4px;
  font-size:.72rem;font-weight:700;letter-spacing:.05em}
.bA1,.bA2{background:#74c7ec18;color:var(--sapphire);border:1px solid #74c7ec40}
.bB1,.bB2,.bB12{background:#cba6f718;color:var(--mauve);border:1px solid #cba6f740}
.bC{background:#a6e3a118;color:var(--green);border:1px solid #a6e3a140}
.bD1,.bD2{background:#fab38718;color:var(--peach);border:1px solid #fab38740}
.bEF{background:#94e2d518;color:var(--teal);border:1px solid #94e2d540}
.bG{background:#f5c2e718;color:var(--pink);border:1px solid #f5c2e740}
.td-svg{text-align:center;padding:.5rem}
td svg{width:100px;height:75px;display:block;margin:auto}
.td-desc{font-size:.8rem;color:var(--sub0);font-style:italic;line-height:1.45}
.td-ex{font-size:.82rem;color:var(--text);line-height:1.5}
.note{font-size:.72rem;color:var(--ov0);margin-top:.3rem;font-style:normal}

/* GROUP HEADERS */
tr.group-hdr td{
  background:var(--mantle);color:var(--mauve);
  font-size:.7rem;text-transform:uppercase;letter-spacing:.1em;
  padding:.4rem 1rem;font-style:normal;font-weight:700;
  border-top:2px solid var(--s1);
}

@media(max-width:780px){
  header{top:0}
  .filter-bar{top:auto;position:static}
  .td-desc{display:none}
  thead th:nth-child(4){display:none}
}
</style>
</head>
<body>

<header>
  <div class="title">IEC 60364-5-52 <span>· Table A.52.3 · Installation Methods</span></div>
  <div class="controls">
    <input id="search" type="text" placeholder="Search…" oninput="applyFilters()">
    <button class="lang-btn active" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('cs')">CS</button>
    <button class="lang-btn" onclick="setLang('de')">DE</button>
  </div>
</header>

<div class="filter-bar">
  <span class="filter-label">Method</span>
  <span class="mpill mall on" onclick="filterMethod('all')">All</span>
  <span class="mpill mA on" onclick="filterMethod('A')">A1 / A2</span>
  <span class="mpill mB on" onclick="filterMethod('B')">B1 / B2</span>
  <span class="mpill mC on" onclick="filterMethod('C')">C</span>
  <span class="mpill mD on" onclick="filterMethod('D')">D1 / D2</span>
  <span class="mpill mE on" onclick="filterMethod('E')">E / F</span>
  <span class="mpill mG on" onclick="filterMethod('G')">G</span>
</div>

<div class="summary-bar">Showing <span id="item-count">—</span> items · IEC 60364-5-52:2009 Table A.52.3</div>

<div class="tbl-wrap">
<table id="tbl">
<thead>
  <tr>
    <th>#</th>
    <th>Method</th>
    <th>Illustration</th>
    <th id="th-desc">Standard Description</th>
    <th id="th-ex">Plain Explanation</th>
    <th id="th-panel">Panel / Switchgear Use</th>
  </tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<script>
// ─── state ───────────────────────────────────────────────────────────────────
let curLang = 'en';
let curMethod = 'all';

// ─── SVG helpers ─────────────────────────────────────────────────────────────
const S = (inner) => `<svg viewBox="0 0 100 80" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;
const bg   = `<rect width="100" height="80" fill="#252338" rx="3"/>`;
const wL   = `<rect x="0" y="0" width="24" height="80" fill="#45475a"/>`;
const wR   = `<rect x="76" y="0" width="24" height="80" fill="#45475a"/>`;
const wT   = `<rect x="0" y="0" width="100" height="18" fill="#45475a"/>`;
const wF   = `<rect width="100" height="80" fill="#45475a"/>`;
const wB80 = `<rect x="0" y="60" width="100" height="20" fill="#45475a"/>`;

function insulFull(c){ 
  const ln=Array.from({length:11},(_,i)=>{const x=i*18-30;return`<line x1="${x}" y1="0" x2="${x+80}" y2="80" stroke="${c}1a" stroke-width="1.5"/>`;}).join('');
  return `<rect width="100" height="80" fill="#2c2844" rx="3"/>${ln}`;
}
function masonryFull(){
  let s=`<rect width="100" height="80" fill="#3e3828"/>`;
  for(let y=0;y<80;y+=12){const off=(Math.floor(y/12)%2)*8;for(let x=-8+off;x<108;x+=16){s+=`<rect x="${x}" y="${y+1}" width="14" height="10" fill="none" stroke="#504e38" stroke-width=".8" rx="1"/>`;}}
  return s;
}
function cond(x,y,r,c){return`<circle cx="${x}" cy="${y}" r="${r}" fill="#181628" stroke="${c}" stroke-width="2"/>`;}
function c1(x,y,r,c){return`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}cc" stroke="${c}" stroke-width="1"/>`;} // single-core
function cM(x,y,r,c){return`<circle cx="${x}" cy="${y}" r="${r}" fill="${c}40" stroke="${c}" stroke-width="1.5"/><circle cx="${x-r*.3}" cy="${y-r*.3}" r="${r*.28}" fill="${c}dd"/><circle cx="${x+r*.3}" cy="${y-r*.3}" r="${r*.28}" fill="${c}dd"/><circle cx="${x}" cy="${y+r*.35}" r="${r*.28}" fill="${c}dd"/>`;} // multi-core
function c3(x,y,r,c){return`<circle cx="${x-r}" cy="${y-.6*r}" r="${r*.6}" fill="${c}cc"/><circle cx="${x+r}" cy="${y-.6*r}" r="${r*.6}" fill="${c}cc"/><circle cx="${x}" cy="${y+.75*r}" r="${r*.6}" fill="${c}cc"/>`;} // 3 conductors
function duct(x,y,w,h,c){return`<rect x="${x}" y="${y}" width="${w}" height="${h}" fill="#181628" stroke="${c}" stroke-width="1.5"/>`;}

// void BG = two structural layers with air gap
function voidBG(){return `${bg}<rect x="0" y="0" width="100" height="18" fill="#45475a"/><rect x="0" y="62" width="100" height="18" fill="#45475a"/>`;}
// channel in floor
function chanBG(closed){
  const fl=`<rect x="0" y="38" width="100" height="42" fill="#45475a"/>`;
  const ch=`<path d="M22,38 L22,68 L78,68 L78,38" fill="#1a1630" stroke="#585b70" stroke-width="1.5"/>`;
  const lid=closed?`<rect x="20" y="36" width="60" height="4" fill="#45475a" stroke="#6c7086" stroke-width="1"/>`:'';
  return `${bg}${fl}${ch}${lid}`;
}
function groundBG(){return `${bg}<rect x="0" y="36" width="100" height="44" fill="#3a2f1e"/><path d="M0,36 Q25,31 50,36 Q75,41 100,36" fill="#5c4a2a"/>`;} 

// ─── SVG generators per item ──────────────────────────────────────────────────
const G = {
  // 1: insulated conductors in conduit in insulated wall
  item1: c => S(insulFull(c)+cond(50,40,18,c)+c3(50,40,10,c)),
  // 2: multi-core in conduit in insulated wall
  item2: c => S(insulFull(c)+cond(50,40,18,c)+cM(50,40,12,c)),
  // 3: multi-core direct in insulated wall
  item3: c => S(insulFull(c)+cM(50,40,14,c)),
  // 4: conductors in conduit on wall
  item4: c => S(`${bg}${wL}`+cond(46,40,16,c)+c3(46,40,9,c)),
  // 5: multi-core in conduit on wall
  item5: c => S(`${bg}${wL}`+cond(46,40,16,c)+cM(46,40,10,c)),
  // 6: single in trunking on wall (horizontal)
  item6: c => S(`${bg}${wL}<rect x="24" y="24" width="44" height="32" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+c3(46,40,10,c)),
  // 7: single in trunking on wall (vertical)
  item7: c => S(`${bg}${wL}<rect x="24" y="10" width="32" height="60" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+c3(40,40,10,c)),
  // 8: multi-core in trunking on wall (horizontal)
  item8: c => S(`${bg}${wL}<rect x="24" y="24" width="44" height="32" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+cM(46,40,11,c)),
  // 9: multi-core in trunking on wall (vertical)
  item9: c => S(`${bg}${wL}<rect x="24" y="10" width="32" height="60" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+cM(40,40,11,c)),
  // 10: conductors in suspended trunking
  item10: c => S(`${bg}${wT}<line x1="38" y1="18" x2="38" y2="30" stroke="${c}" stroke-width="1.5"/><line x1="62" y1="18" x2="62" y2="30" stroke="${c}" stroke-width="1.5"/><rect x="24" y="30" width="52" height="26" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+c3(50,43,9,c)),
  // 11: multi-core in suspended trunking
  item11: c => S(`${bg}${wT}<line x1="38" y1="18" x2="38" y2="30" stroke="${c}" stroke-width="1.5"/><line x1="62" y1="18" x2="62" y2="30" stroke="${c}" stroke-width="1.5"/><rect x="24" y="30" width="52" height="26" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+cM(50,43,11,c)),
  // 12: conductors in moulding
  item12: c => S(`${bg}${wL}<path d="M24,28 Q32,16 44,28 L44,62 L24,62 Z" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+c1(34,46,6,c)),
  // 13: multi-core in moulding
  item13: c => S(`${bg}${wL}<path d="M24,28 Q32,16 44,28 L44,62 L24,62 Z" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+cM(34,46,8,c)),
  // 15: in architrave
  item15: c => S(`${bg}<rect x="8" y="0" width="84" height="80" fill="#45475a"/><rect x="20" y="0" width="60" height="80" fill="#252338"/><rect x="14" y="14" width="72" height="10" fill="#45475a"/>`+c1(23,40,5,c)),
  // 16: in window frame
  item16: c => S(`${bg}<rect x="8" y="8" width="84" height="64" fill="#45475a" rx="2"/><rect x="16" y="16" width="68" height="48" fill="#1a2a3a"/><rect x="46" y="14" width="8" height="52" fill="#45475a"/><rect x="14" y="37" width="72" height="6" fill="#45475a"/>`+c1(24,42,5,c)),
  // 20: cable fixed on wall
  item20: c => S(`${bg}${wL}`+c1(38,40,11,c)),
  // 21: cable fixed under ceiling
  item21: c => S(`${bg}${wT}`+c1(50,32,11,c)),
  // 30: unperforated tray
  item30: c => S(`${bg}<path d="M12,56 L12,44 L88,44 L88,56" fill="#181628" stroke="${c}" stroke-width="2"/>`+c1(30,35,8,c)+c1(50,35,8,c)+c1(70,35,8,c)),
  // 31: perforated tray
  item31: c => {
    const pts=Array.from({length:7},(_,i)=>`<circle cx="${18+i*11}" cy="51" r="2.2" fill="${c}30" stroke="${c}60" stroke-width=".8"/>`).join('');
    return S(`${bg}<path d="M12,56 L12,44 L88,44 L88,56" fill="#181628" stroke="${c}" stroke-width="2"/>${pts}`+c1(30,35,8,c)+c1(50,35,8,c)+c1(70,35,8,c));
  },
  // 32: cable ladder
  item32: c => {
    const rl=`<line x1="12" y1="38" x2="88" y2="38" stroke="${c}" stroke-width="2"/><line x1="12" y1="54" x2="88" y2="54" stroke="${c}" stroke-width="2"/>`;
    const rgs=Array.from({length:6},(_,i)=>`<line x1="${18+i*13}" y1="38" x2="${18+i*13}" y2="54" stroke="${c}" stroke-width="2"/>`).join('');
    return S(`${bg}${rl}${rgs}`+c1(26,28,8,c)+c1(50,28,8,c)+c1(74,28,8,c));
  },
  // 33: cables spaced >0.3D from wall (free air near wall)
  item33: c => S(`${bg}${wL}<line x1="24" y1="30" x2="40" y2="30" stroke="${c}50" stroke-width="1" stroke-dasharray="3,2"/><line x1="24" y1="52" x2="40" y2="52" stroke="${c}50" stroke-width="1" stroke-dasharray="3,2"/>`+cM(50,30,10,c)+cM(50,52,10,c)),
  // 34: cable with catenary wire
  item34: c => S(`${bg}<path d="M8,20 Q50,32 92,20" fill="none" stroke="${c}" stroke-width="1.5"/><line x1="28" y1="22" x2="28" y2="40" stroke="${c}80" stroke-width="1"/><line x1="50" y1="28" x2="50" y2="46" stroke="${c}80" stroke-width="1"/><line x1="72" y1="22" x2="72" y2="40" stroke="${c}80" stroke-width="1"/><path d="M8,42 Q50,54 92,42" fill="none" stroke="${c}" stroke-width="3"/>`),
  // 35: bare/insulated conductors on insulators
  item35: c => S(`${bg}${wB80}<rect x="25" y="42" width="10" height="18" fill="#585b70" rx="2"/><rect x="22" y="40" width="16" height="4" fill="#45475a" rx="1"/><rect x="65" y="42" width="10" height="18" fill="#585b70" rx="2"/><rect x="62" y="40" width="16" height="4" fill="#45475a" rx="1"/><line x1="5" y1="37" x2="95" y2="37" stroke="${c}" stroke-width="3"/>`),
  // 36: alternative insulator mount (bare conductors)
  item36: c => S(`${bg}${wB80}<rect x="25" y="42" width="10" height="18" fill="#585b70" rx="2"/><rect x="22" y="40" width="16" height="4" fill="#45475a" rx="1"/><rect x="65" y="42" width="10" height="18" fill="#585b70" rx="2"/><rect x="62" y="40" width="16" height="4" fill="#45475a" rx="1"/><line x1="5" y1="37" x2="42" y2="37" stroke="${c}" stroke-width="3"/><line x1="58" y1="37" x2="95" y2="37" stroke="${c}" stroke-width="3"/>`),
  // 40: cable in building void
  item40: c => S(voidBG()+cM(50,40,12,c)),
  // 41: insulated conductors in conduit in void
  item41: c => S(voidBG()+cond(50,40,16,c)+c3(50,40,9,c)),
  // 42: cable in conduit in void
  item42: c => S(voidBG()+cond(50,40,16,c)+cM(50,40,10,c)),
  // 43: insulated conductors in ducting in void
  item43: c => S(voidBG()+duct(28,30,44,20,c)+c3(50,40,8,c)),
  // 44: cable in ducting in void
  item44: c => S(voidBG()+duct(28,30,44,20,c)+cM(50,40,10,c)),
  // 45: insulated conductors in ducting in masonry
  item45: c => S(masonryFull()+duct(28,28,44,24,c)+c3(50,40,9,c)),
  // 46: cable in ducting in masonry (thermal res ≤ 2 K·m/W)
  item46: c => S(masonryFull()+duct(28,28,44,24,c)+cM(50,40,11,c)),
  // 46B: cable in ducting in masonry with raised floor thermal resistance
  item46B: c => S(masonryFull()+duct(28,28,44,24,c)+cM(50,40,11,c)+`<rect x="0" y="64" width="100" height="5" fill="#585b70" stroke="${c}40" stroke-width="1"/>`),
  // 47: cable in ceiling void / raised floor
  item47: c => S(`${bg}<rect x="0" y="0" width="100" height="18" fill="#45475a"/><rect x="0" y="62" width="100" height="18" fill="#45475a"/>`+cM(50,40,11,c)),
  // 52: multi-core in flush trunking (in wall)
  item52: c => S(`${bg}${wL}<rect x="0" y="25" width="24" height="30" fill="#181628" stroke="${c}" stroke-width="1.5"/>`+cM(12,40,10,c)),
  // 53: cable/conduit in unventilated cable channel
  item53: c => S(chanBG(true)+cond(50,55,13,c)+cM(50,55,9,c)),
  // 55: conduit in open/ventilated channel in floor
  item55: c => S(chanBG(false)+cond(50,55,13,c)+c3(50,55,8,c)),
  // 56: cable in open/ventilated channel
  item56: c => S(chanBG(false)+cM(50,55,11,c)),
  // 57: cable direct in masonry (no protection)
  item57: c => S(masonryFull()+cM(50,40,12,c)),
  // 58: cable direct in masonry (with mechanical protection)
  item58: c => S(masonryFull()+cond(50,40,17,c)+cM(50,40,11,c)),
  // 70: multi-core in conduit in ground
  item70: c => S(groundBG()+cond(50,57,15,c)+cM(50,57,9,c)),
  // 71: single-core cables in conduit in ground
  item71: c => S(groundBG()+cond(50,57,15,c)+c3(50,57,9,c)),
  // 72: cable direct in ground
  item72: c => S(groundBG()+cM(50,57,12,c)),
  // 73: cable in ground with mechanical protection
  item73: c => S(groundBG()+`<rect x="30" y="42" width="40" height="6" fill="#585b70" rx="1"/>`+cM(50,58,11,c)),
};

// ─── method color ─────────────────────────────────────────────────────────────
const MC = {A1:'#74c7ec',A2:'#74c7ec',B1:'#cba6f7',B2:'#cba6f7','B1/B2':'#cba6f7',
  C:'#a6e3a1',D1:'#fab387',D2:'#fab387','E or F':'#94e2d5',G:'#f5c2e7'};

// ─── method badge class ───────────────────────────────────────────────────────
function badgeClass(m){
  if(m.startsWith('A')) return 'bA'+m[1];
  if(m==='B1') return 'bB1';
  if(m==='B2') return 'bB2';
  if(m==='B1/B2') return 'bB12';
  if(m==='C') return 'bC';
  if(m.startsWith('D')) return 'bD'+m[1];
  if(m==='E or F') return 'bEF';
  if(m==='G') return 'bG';
  return '';
}

// ─── render ───────────────────────────────────────────────────────────────────
function panelCell(id, l) {
  const p = PANEL[id];
  if (!p) return '<span class="prelvt pno">—</span>';
  const label = {yes:{en:'Relevant',cs:'Relevantní',de:'Relevant'}, partial:{en:'Partial',cs:'Částečně',de:'Teilweise'}, no:{en:'N/A',cs:'N/A',de:'N/A'}};
  const cls = {yes:'pyes', partial:'ppart', no:'pno'};
  const note = p[l] !== '—' ? `<div class="pnote">${p[l]}</div>` : '';
  return `<span class="prelvt ${cls[p.r]}">${label[p.r][l]}</span>${note}`;
}

function render() {
  const tbody = document.getElementById('tbody');
  let lastGroup = null;
  let rows = '';

  ITEMS.forEach(item => {
    if (item.group !== lastGroup) {
      const g = GMAP[item.group];
      rows += `<tr class="group-hdr" data-group="${item.group}">
        <td colspan="5">${g[curLang]}</td>
      </tr>`;
      lastGroup = item.group;
    }
    const c = MC[item.method] || '#cba6f7';
    const svgMarkup = G[item.svgFn](c);
    const bc = badgeClass(item.method);
    rows += `<tr data-id="${item.id}" data-method="${item.method}" data-group="${item.group}">
      <td class="td-n">${item.id}</td>
      <td class="td-m"><span class="mbadge ${bc}">${item.method}</span></td>
      <td class="td-svg">${svgMarkup}</td>
      <td class="td-desc">${item.desc[curLang]}</td>
      <td class="td-ex">${item.expl[curLang]}</td>
      <td class="td-panel">${panelCell(item.id, curLang)}</td>
    </tr>`;
  });
  tbody.innerHTML = rows;
  applyFilters();
}

// ─── filters ──────────────────────────────────────────────────────────────────
function setLang(l) {
  curLang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === l.toUpperCase());
  });
  // Update table header labels
  document.getElementById('th-desc').textContent =
    {en:'Standard Description',cs:'Popis z normy',de:'Normbeschreibung'}[l];
  document.getElementById('th-ex').textContent =
    {en:'Plain Explanation',cs:'Jednoduché vysvětlení',de:'Einfache Erklärung'}[l];
  document.getElementById('th-panel').textContent =
    {en:'Panel / Switchgear Use',cs:'Použití v rozvaděči',de:'Verwendung im Schaltschrank'}[l];
  // Re-render text content only (keep SVGs)
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const id = tr.dataset.id;
    const item = ITEMS.find(i => String(i.id) === id);
    if (!item) return;
    tr.querySelector('.td-desc').textContent = item.desc[l];
    tr.querySelector('.td-ex').textContent = item.expl[l];
    tr.querySelector('.td-panel').innerHTML = panelCell(item.id, l);
  });
  // Update group headers
  document.querySelectorAll('.group-hdr').forEach(tr => {
    const g = GMAP[tr.dataset.group];
    if (g) tr.querySelector('td').textContent = g[l];
  });
  applyFilters();
}

function filterMethod(m) {
  curMethod = m;
  document.querySelectorAll('.mpill').forEach(p => {
    const pm = p.textContent.replace(/\s*/g,'');
    p.classList.toggle('on',
      m === 'all' || pm === 'All' ||
      (m === 'A' && (pm === 'A1/A2')) ||
      (m === 'B' && (pm === 'B1/B2')) ||
      (m === 'C' && pm === 'C') ||
      (m === 'D' && (pm === 'D1/D2')) ||
      (m === 'E' && (pm === 'E/F')) ||
      (m === 'G' && pm === 'G') ||
      pm === 'All'
    );
  });
  applyFilters();
}

function applyFilters() {
  const q = document.getElementById('search').value.toLowerCase();
  let visible = 0;
  let lastVisibleGroup = null;

  // First pass: determine which items are visible
  const groupVisibility = {};
  document.querySelectorAll('#tbody tr[data-id]').forEach(tr => {
    const method = tr.dataset.method;
    const methodMatch = curMethod === 'all' ||
      (curMethod === 'A' && method.startsWith('A')) ||
      (curMethod === 'B' && method.startsWith('B')) ||
      (curMethod === 'C' && method === 'C') ||
      (curMethod === 'D' && method.startsWith('D')) ||
      (curMethod === 'E' && method.includes('E')) ||
      (curMethod === 'G' && method === 'G');

    const textMatch = !q || tr.textContent.toLowerCase().includes(q);
    const show = methodMatch && textMatch;
    tr.classList.toggle('hidden', !show);
    if (show) {
      visible++;
      groupVisibility[tr.dataset.group] = true;
    }
  });

  // Second pass: hide/show group headers
  document.querySelectorAll('#tbody tr.group-hdr').forEach(tr => {
    tr.classList.toggle('hidden', !groupVisibility[tr.dataset.group]);
  });

  document.getElementById('item-count').textContent = `${visible} of ${ITEMS.length}`;
}

// ─── init ─────────────────────────────────────────────────────────────────────
render();
</script>
